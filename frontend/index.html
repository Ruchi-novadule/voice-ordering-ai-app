<!DOCTYPE html>
<html>
<head>
    <title>Voice Ordering App 🎤</title>
</head>
<body>

<h2>🎤 Voice Ordering App</h2>

<button onclick="startListening()">Start Speaking</button>

<h3>📝 Your Speech:</h3>
<p id="output"></p>

<h3>🍔 Matched Items:</h3>
<p id="result"></p>

<h3>🧾 Order Summary:</h3>
<pre id="summary"></pre>

<script>
let recognition;

function startListening() {
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = function(event) {
        let transcript = "";

        for (let i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
        }

        document.getElementById("output").innerText = transcript;

        if (event.results[event.results.length - 1].isFinal) {
            sendToBackend(transcript);
        }
    };

    recognition.start();
}

function sendToBackend(text) {
    fetch("http://127.0.0.1:8000/match-order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("result").innerText =
            data.matched_items.join(", ");

        let summaryText = data.order_summary.join("\n");
        summaryText += "\nTotal items: " + data.total_items;
        summaryText += "\nTotal price: ₹" + data.total_price;

        document.getElementById("summary").innerText = summaryText;
    })
    .catch(err => {
        console.error(err);
        document.getElementById("summary").innerText = "Error connecting to backend";
    });
}
</script>

</body>
</html>
